<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VELORA</title>

<!-- Google Font (luxury serif + clean sans) -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,Arial;background:#f6f3ef;color:#222}

/* TOP BAR */
.topbar{background:#000;color:#fff;text-align:center;padding:6px;font-size:12px;letter-spacing:.5px}

/* NAV */
nav{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;background:#fff;border-bottom:1px solid #eee}
nav h2{font-family:"Playfair Display",serif;letter-spacing:4px;font-weight:600}
nav a{margin:0 14px;text-decoration:none;color:#333;font-size:14px}
.icons span{margin-left:12px;cursor:pointer}

/* HERO */
.hero{height:85vh;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:1s}
.slide.active{opacity:1}
.hero-text{position:absolute;bottom:60px;left:60px}
.hero-text h1{font-family:"Playfair Display",serif;font-size:64px;font-weight:400}
.hero-text p{margin-top:10px}
.hero-text button{margin-top:15px;padding:10px 22px;background:#000;color:#fff;border:none;cursor:pointer}

/* dots */
.dots{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc}
.dot.active{background:#000}

/* SECTION */
.section{padding:60px 40px}
.section h2{text-align:center;font-family:"Playfair Display";font-weight:400;margin-bottom:30px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}

/* CARD */
.card{background:#fff;padding:12px;position:relative}
.card img{width:100%;height:260px;object-fit:cover}
.card h4{margin-top:10px;font-weight:400}
.price{font-size:14px}
.btn{width:100%;padding:8px;background:#000;color:#fff;border:none;margin-top:10px;cursor:pointer}

/* wishlist */
.wish{position:absolute;top:10px;right:10px;font-size:18px;cursor:pointer}
.wish.active{color:red}

/* CART */
.cart{position:fixed;right:-360px;top:0;width:340px;height:100%;background:#fff;padding:20px;border-left:1px solid #eee;transition:.3s;overflow:auto}
.cart.active{right:0}
.cart-item{display:flex;gap:10px;margin:12px 0}
.cart-item img{width:60px;height:60px;object-fit:cover}
.qty{display:flex;gap:5px;margin-top:5px}
.qty button{padding:2px 6px}

/* total */
.summary{margin-top:15px;font-size:14px}
.summary div{display:flex;justify-content:space-between;margin:5px 0}
.total{font-weight:bold}

/* LOGIN MODAL */
.login-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center}
.login-box{background:#fff;padding:25px;width:280px}
.login-box input{width:100%;padding:8px;margin:5px 0}
.login-box button{width:100%;padding:8px;background:#000;color:#fff;border:none}

/* FOOTER */
footer{background:#000;color:#fff;text-align:center;padding:20px;margin-top:40px}
</style>
</head>

<body>

<div class="topbar">FREE SHIPPING ON ORDERS OVER Rp500.000</div>

<nav>
  <h2>VELORA</h2>
  <div>
    <a href="#">HOME</a>
    <a href="#">SHOP</a>
    <a href="#">COLLECTION</a>
    <a href="#">ABOUT</a>
  </div>
  <div class="icons">
    <span onclick="openLogin()">👤</span>
    <span onclick="toggleCart()">🛒 (<span id="count">0</span>)</span>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1520975916090-3105956dac38')"></div>
  <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1516826957135-700dedea698c')"></div>

  <div class="hero-text">
    <h1>VELORA</h1>
    <p>Define Your Elegance</p>
    <button>SHOP NOW</button>
  </div>

  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
  </div>
</section>

<!-- PRODUCTS -->
<section class="section">
<h2>Our Latest Picks</h2>

<div class="grid">
  <div class="card">
    <span class="wish" onclick="wish(this)">♡</span>
    <img src="1.jpeg">
    <h4>Elegant Dress</h4>
    <p class="price">Rp399.000</p>
    <button class="btn" onclick="add('Dress',399000,this)">Add to Cart</button>
  </div>

  <div class="card">
    <span class="wish" onclick="wish(this)">♡</span>
    <img src="2.jpeg">
    <h4>Luxury Blazer</h4>
    <p class="price">Rp499.000</p>
    <button class="btn" onclick="add('Blazer',499000,this)">Add</button>
  </div>

  <div class="card">
    <span class="wish" onclick="wish(this)">♡</span>
    <img src="3.jpeg">
    <h4>Classic Outfit</h4>
    <p class="price">Rp450.000</p>
    <button class="btn" onclick="add('Outfit',450000,this)">Add</button>
  </div>
</div>
</section>

<!-- CART -->
<div class="cart" id="cart">
  <h3>Your Cart</h3>
  <div id="items"></div>

  <div class="summary">
    <div><span>Subtotal</span><span id="sub">0</span></div>
    <div><span>Shipping</span><span>20000</span></div>
    <div class="total"><span>Total</span><span id="total">0</span></div>
  </div>
</div>

<!-- LOGIN -->
<div class="login-bg" id="login">
  <div class="login-box">
    <h3>Login</h3>
    <input placeholder="Email">
    <input placeholder="Password">
    <button>Login</button>
  </div>
</div>

<footer>© 2026 VELORA</footer>

<script>
let cart=[];
let slides=document.querySelectorAll(".slide");
let dots=document.querySelectorAll(".dot");
let i=0;

/* SLIDER */
setInterval(()=>{
  slides[i].classList.remove("active");
  dots[i].classList.remove("active");
  i=(i+1)%slides.length;
  slides[i].classList.add("active");
  dots[i].classList.add("active");
},3000);

/* WISHLIST */
function wish(el){
  el.classList.toggle("active");
  el.innerText = el.classList.contains("active") ? "❤" : "♡";
}

/* CART */
function add(name,price,btn){
  let img=btn.parentElement.querySelector("img").src;

  let found=cart.find(i=>i.name===name);
  if(found){found.qty++}
  else{cart.push({name,price,img,qty:1})}

  update();
}

function update(){
  document.getElementById("count").innerText=cart.length;

  let html="";
  let sub=0;

  cart.forEach((i,index)=>{
    sub+=i.price*i.qty;

    html+=`
    <div class="cart-item">
      <img src="${i.img}">
      <div>
        ${i.name}<br>Rp ${i.price}
        <div class="qty">
          <button onclick="change(${index},-1)">-</button>
          ${i.qty}
          <button onclick="change(${index},1)">+</button>
        </div>
      </div>
    </div>`;
  });

  document.getElementById("items").innerHTML=html;
  document.getElementById("sub").innerText=sub;
  document.getElementById("total").innerText=sub+20000;
}

function change(i,val){
  cart[i].qty+=val;
  if(cart[i].qty<=0) cart.splice(i,1);
  update();
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

/* LOGIN */
function openLogin(){
  document.getElementById("login").style.display="flex";
}
document.getElementById("login").onclick=function(e){
  if(e.target.id==="login") this.style.display="none";
}
</script>

</body>
</html>
